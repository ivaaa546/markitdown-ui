[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "markitdown-ui"
version = "0.0.1"
description = "Streamlit UI for MarkItDown"
requires-python = ">=3.10"
dependencies = [
    "markitdown[all]",
    "streamlit>=1.28.0",
]

[tool.hatch.envs.default]
dependencies = [
    "pytest",
    "pytest-cov"
]

[tool.hatch.envs.default.scripts]
test = "pytest {args:tests}"

[tool.hatch.envs.types]
dependencies = [
    "mypy"
]

[tool.hatch.envs.types.scripts]
check = "mypy app.py tests"
